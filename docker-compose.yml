version: '3.8'
services:
  backend:
    build: ./apps/backend
    ports:
      - "3000:3000"
    env_file:
      - ./apps/backend/.env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fixmycity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: